<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التحدي المستقبلي للتواريخ والمصطلحات | باك 2026</title>
    <style>
        :root {
            --bg-glow: #0a0f1d;
            --card-cyber: #131a30;
            --neon-blue: #00d2ff;
            --neon-orange: #ff9f43;
            --neon-green: #00ffa2;
            --neon-red: #ff4757;
            --text-main: #e2e8f0;
            --text-muted: #8a99ad;
            --border-cyber: rgba(0, 210, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-glow);
            background-image: 
                radial-gradient(at 10% 20%, rgba(0, 210, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(255, 159, 67, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .cyber-container {
            width: 100%;
            max-width: 850px;
            background: var(--card-cyber);
            border: 1px solid var(--border-cyber);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.1);
            padding: 35px;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .cyber-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-orange));
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }

        .logo-frame {
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-orange));
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-frame img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            background: var(--card-cyber);
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            line-height: 1.4;
        }

        .subtitle {
            color: var(--neon-blue);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .unit-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .type-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
            padding: 5px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .unit-btn, .type-btn {
            padding: 12px 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            text-align: center;
        }

        .unit-btn:hover, .type-btn:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.15);
            background: rgba(0, 210, 255, 0.03);
        }

        .unit-btn.active {
            background: linear-gradient(135deg, rgba(0, 210, 255, 0.2), rgba(0, 210, 255, 0.05));
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .type-btn.active {
            background: linear-gradient(135deg, rgba(255, 159, 67, 0.2), rgba(255, 159, 67, 0.05));
            border-color: var(--neon-orange);
            color: var(--neon-orange);
            box-shadow: 0 0 15px rgba(255, 159, 67, 0.2);
        }

        .progress-wrapper {
            background: rgba(255, 255, 255, 0.05);
            height: 6px;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-glow {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 0.4s ease;
        }

        .quiz-panel {
            display: none;
        }

        .quiz-panel.active {
            display: block;
        }

        .event-card {
            background: rgba(20, 27, 47, 0.6);
            border: 1px solid rgba(0, 210, 255, 0.1);
            padding: 30px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            line-height: 1.7;
            margin-bottom: 25px;
            color: #ffffff;
            box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.02);
            text-align: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (max-width: 600px) {
            .unit-grid, .type-grid, .options-grid { grid-template-columns: 1fr; }
        }

        .option-node {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px 22px;
            text-align: right;
            color: var(--text-main);
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
            line-height: 1.4;
        }

        .option-node:hover:not([disabled]) {
            border-color: var(--neon-blue);
            background: rgba(0, 210, 255, 0.04);
            transform: translateY(-2px);
        }

        .option-node.correct {
            background: rgba(0, 255, 162, 0.1) !important;
            border-color: var(--neon-green) !important;
            color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 162, 0.2);
            font-weight: 700;
        }

        .option-node.wrong {
            background: rgba(255, 71, 87, 0.1) !important;
            border-color: var(--neon-red) !important;
            color: var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.2);
        }

        .control-panel {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        .action-cyber-btn {
            background: linear-gradient(135deg, var(--neon-blue), #0082c8);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            transition: all 0.2s ease;
            display: none;
        }

        .action-cyber-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        .end-panel {
            display: none;
            text-align: center;
            padding: 30px 0;
        }

        .end-panel h2 {
            color: var(--neon-green);
            font-size: 28px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 255, 162, 0.3);
        }

        .score-matrix {
            font-size: 22px;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .score-matrix span {
            color: var(--neon-blue);
            font-weight: 800;
        }

        .reload-btn {
            background: transparent;
            border: 2px solid var(--neon-orange);
            color: var(--neon-orange);
            padding: 14px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reload-btn:hover {
            background: var(--neon-orange);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 159, 67, 0.4);
        }
    </style>
</head>
<body>

<div class="cyber-container">
    <header>
        <div class="logo-frame">
            <img src="logo.png" alt="School Logo" onerror="this.style.display='none'; this.parentNode.innerText='LOGO';">
        </div>
        <h1>مدرسة الرهان العلمي تقدم: المنظومة الإلكترونية للتحضير الذكي</h1>
        <div class="subtitle">🎯 مراجعة تفاعلية شاملة لشهادة البكالوريا 2026</div>
    </header>

    <div class="unit-grid" id="unit-selector">
        <button class="unit-btn active" onclick="switchUnit(1)">الحرب الباردة</button>
        <button class="unit-btn" onclick="switchUnit(2)">الثورة الجزائرية</button>
        <button class="unit-btn" onclick="switchUnit(3)">حركات التحرر وفلسطين</button>
    </div>

    <div class="type-grid" id="type-selector">
        <button class="type-btn active" onclick="switchType('dates')">📅 التواريخ المعلمية</button>
        <button class="type-btn" onclick="switchType('terms')">📖 المصطلحات والمفاهيم</button>
        <button class="type-btn" onclick="switchType('characters')">👤 الشخصيات البارزة</button>
    </div>

    <div class="progress-wrapper">
        <div class="progress-glow" id="progressBar"></div>
    </div>

    <div class="quiz-panel active" id="quizPanel">
        <div class="event-card" id="eventText">جاري استدعاء البيانات ونمذجة الاختبار...</div>
        <div class="options-grid" id="optionsGrid">
            </div>
        <div class="control-panel">
            <button class="action-cyber-btn" id="nextBtn" onclick="triggerNext()">التالي وعقد البيانات 🌐</button>
        </div>
    </div>

    <div class="end-panel" id="endPanel">
        <h2>تمت معالجة البيانات بنجاح نظامي</h2>
        <div class="score-matrix">معدل الدقة الحركية المستهدفة: <span id="finalScore">00</span> / 10</div>
        <button class="reload-btn" onclick="rebootQuiz()">إعادة تشغيل المحاكاة 🔄</button>
    </div>
</div>

let currentUnit = 1;
let currentType = 'dates';
let sessionQuestions = [];
let currentIndex = 0;
let totalCorrect = 0;

function shuffleArr(targetArray) {
    return targetArray.sort(() => Math.random() - 0.5);
}

function switchUnit(unitID) {
    currentUnit = unitID;
    const selectorButtons = document.querySelectorAll('.unit-btn');
    selectorButtons.forEach((btn, idx) => btn.classList.toggle('active', idx === unitID - 1));
    rebootQuiz();
}

function switchType(typeString) {
    currentType = typeString;
    const typeButtons = document.querySelectorAll('.type-btn');
    typeButtons.forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('onclick').includes(typeString));
    });
    rebootQuiz();
}

function compileSessionData() {
    let activePool = [...DATA_STORE[`unit${currentUnit}`][currentType]];
    let localPool = [...activePool];
    shuffleArr(localPool);
    let chosenPool = localPool.slice(0, 10); 
    
    sessionQuestions = chosenPool.map(node => {
        let decoys = activePool
            .filter(element => element.date !== node.date)
            .map(element => element.date);
        shuffleArr(decoys);
        
        let mixedChoices = [node.date, decoys[0], decoys[1], decoys[2]].filter(Boolean);
        // في حالة ندرة المشتتات بالوحدات الصغيرة يتم جلب مكملات من نفس النوع
        while(mixedChoices.length < 4) {
             mixedChoices.push("خيارات مكملة للنظام");
        }
        shuffleArr(mixedChoices);
        
        return {
            eventText: node.event,
            correctDate: node.date,
            allOptions: mixedChoices
        };
    });
}

function renderQuestion() {
    document.getElementById('nextBtn').style.display = 'none';
    let currentQuestionNode = sessionQuestions[currentIndex];
    
    let currentProgress = (currentIndex / sessionQuestions.length) * 100;
    document.getElementById('progressBar').style.width = `${currentProgress}%`;
    
    let prefixText = "تحديد تاريخ الحدث: ";
    if (currentType === 'terms') prefixText = "ما هو المصطلح المقصود بالتعريف التالي: ";
    if (currentType === 'characters') prefixText = "من هي الشخصية المقصودة بالتعريف التاريخي: ";
    
    document.getElementById('eventText').innerText = `${prefixText} [ ${currentQuestionNode.eventText} ]`;
    
    const containerGrid = document.getElementById('optionsGrid');
    containerGrid.innerHTML = '';
    
    currentQuestionNode.allOptions.forEach(choiceText => {
        const optionButton = document.createElement('button');
        optionButton.className = 'option-node';
        optionButton.innerText = choiceText;
        optionButton.onclick = () => verifySelection(optionButton, choiceText, currentQuestionNode.correctDate);
        containerGrid.appendChild(optionButton);
    });
}

function verifySelection(clickedElement, userChoice, correctChoice) {
    const allGridButtons = document.querySelectorAll('.option-node');
    allGridButtons.forEach(btn => btn.disabled = true);
    
    if (userChoice === correctChoice) {
        clickedElement.classList.add('correct');
        totalCorrect++;
    } else {
        clickedElement.classList.add('wrong');
        allGridButtons.forEach(btn => {
            if (btn.innerText === correctChoice) btn.classList.add('correct');
        });
    }
    
    document.getElementById('nextBtn').style.display = 'block';
}

function triggerNext() {
    currentIndex++;
    if (currentIndex < sessionQuestions.length) {
        renderQuestion();
    } else {
        renderEvaluation();
    }
}

function renderEvaluation() {
    document.getElementById('progressBar').style.width = '100%';
    document.getElementById('quizPanel').style.display = 'none';
    document.getElementById('unit-selector').style.display = 'none';
    document.getElementById('type-selector').style.display = 'none';
    
    const finalView = document.getElementById('endPanel');
    finalView.style.display = 'block';
    
    document.getElementById('finalScore').innerText = totalCorrect < 10 ? `0${totalCorrect}` : totalCorrect;
}

function rebootQuiz() {
    currentIndex = 0;
    totalCorrect = 0;
    document.getElementById('quizPanel').style.display = 'block';
    document.getElementById('unit-selector').style.display = 'grid';
    document.getElementById('type-selector').style.display = 'grid';
    document.getElementById('endPanel').style.display = 'none';
    compileSessionData();
    renderQuestion();
}

// تشغيل النظام المبدئي فور الفتح والتحميل تلقائياً
compileSessionData();
renderQuestion();
</script>
